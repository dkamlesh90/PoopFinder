<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Poop Finder — Icon Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f8f4ff; padding: 32px; color: #222; }
    h1  { font-size: 24px; font-weight: 900; color: #7C3AED; margin-bottom: 6px; }
    p   { font-size: 14px; color: #555; margin-bottom: 28px; line-height: 1.6; }
    code { background: #ede9fe; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .grid { display: flex; gap: 20px; flex-wrap: wrap; }
    .card { background: #fff; border-radius: 16px; padding: 20px;
            box-shadow: 0 2px 12px rgba(124,58,237,0.10); text-align: center; }
    canvas { display: block; border-radius: 10px; margin-bottom: 10px;
             border: 1px solid #ede9fe; }
    .card-label { font-size: 13px; font-weight: 700; color: #444; margin-bottom: 12px; }
    .card-sub   { font-size: 11px; color: #888; margin-bottom: 12px; }
    button { background: #7C3AED; color: #fff; border: none; padding: 9px 18px;
             border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700;
             transition: background 0.15s; }
    button:hover { background: #6D28D9; }
  </style>
</head>
<body>
  <h1>🚽 Poop Finder — Icon Generator</h1>
  <p>
    Open this file in any browser (<b>no install needed</b>).<br>
    Click <b>Download</b> under each icon, then move the downloaded PNGs into
    <code>assets/</code>, replacing the placeholders.
  </p>
  <div class="grid" id="grid"></div>

  <script>
    // ─── SVG sources (inlined so this file works from file://) ───────────────

    const ICON_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <ellipse cx="512" cy="-60" rx="520" ry="340" fill="rgba(255,255,255,0.08)"/>
  <g filter="url(#sh)">
    <rect x="327" y="158" width="370" height="52"  rx="26" fill="white"/>
    <rect x="352" y="200" width="320" height="188" rx="28" fill="white"/>
    <rect x="637" y="257" width="52"  height="20"  rx="10" fill="#7C3AED" opacity="0.55"/>
    <rect x="242" y="374" width="540" height="86"  rx="43" fill="white"/>
    <path d="M 267 448 L 757 448 C 757 848 267 848 267 448 Z" fill="white"/>
    <rect x="392" y="816" width="240" height="46"  rx="14" fill="white"/>
  </g>
  <ellipse cx="512" cy="718" rx="165" ry="56" fill="#7C3AED" opacity="0.13"/>
</svg>`;

    const ADAPTIVE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <filter id="sh2">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(0,0,0,0.22)"/>
    </filter>
  </defs>
  <g filter="url(#sh2)">
    <rect x="347" y="188" width="330" height="46"  rx="23" fill="white"/>
    <rect x="367" y="226" width="290" height="168" rx="24" fill="white"/>
    <rect x="627" y="278" width="46"  height="18"  rx="9"  fill="#7C3AED" opacity="0.55"/>
    <rect x="262" y="380" width="500" height="78"  rx="39" fill="white"/>
    <path d="M 282 446 L 742 446 C 742 796 282 796 282 446 Z" fill="white"/>
    <rect x="402" y="766" width="220" height="42"  rx="12" fill="white"/>
  </g>
  <ellipse cx="512" cy="668" rx="148" ry="50" fill="#7C3AED" opacity="0.13"/>
</svg>`;

    // ─── Job definitions ──────────────────────────────────────────────────────

    const JOBS = [
      { label: 'icon.png',          sub: '1024 × 1024 · iOS / Android',          svg: ICON_SVG,     size: 1024, preview: 160 },
      { label: 'adaptive-icon.png', sub: '1024 × 1024 · Android foreground',      svg: ADAPTIVE_SVG, size: 1024, preview: 160 },
      { label: 'splash-icon.png',   sub: '1024 × 1024 · Expo splash',             svg: ICON_SVG,     size: 1024, preview: 160 },
      { label: 'favicon.png',       sub: '48 × 48 · Web tab',                     svg: ICON_SVG,     size: 48,   preview:  96 },
    ];

    // ─── Render ───────────────────────────────────────────────────────────────

    JOBS.forEach(job => {
      const card  = document.createElement('div');
      card.className = 'card';

      const canvas = document.createElement('canvas');
      canvas.width  = job.preview;
      canvas.height = job.preview;

      const labelEl = document.createElement('div');
      labelEl.className   = 'card-label';
      labelEl.textContent = job.label;

      const subEl = document.createElement('div');
      subEl.className   = 'card-sub';
      subEl.textContent = job.sub;

      const btn = document.createElement('button');
      btn.textContent = 'Download';
      btn.disabled    = true;

      card.append(canvas, labelEl, subEl, btn);
      document.getElementById('grid').appendChild(card);

      // SVG string → Blob URL → Image
      const blob = new Blob([job.svg], { type: 'image/svg+xml' });
      const url  = URL.createObjectURL(blob);
      const img  = new Image();

      img.onload = () => {
        // Preview
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, job.preview, job.preview);

        // Full-size download
        btn.disabled = false;
        btn.onclick  = () => {
          const full  = document.createElement('canvas');
          full.width  = job.size;
          full.height = job.size;
          full.getContext('2d').drawImage(img, 0, 0, job.size, job.size);
          const a    = document.createElement('a');
          a.href     = full.toDataURL('image/png');
          a.download = job.label;
          a.click();
        };

        URL.revokeObjectURL(url);
      };

      img.onerror = () => {
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#991B1B';
        ctx.font      = '13px sans-serif';
        ctx.fillText('Render failed', 8, canvas.height / 2);
      };

      img.src = url;
    });
  </script>
</body>
</html>
